# agentRAG 默认配置
# 可通过环境变量覆盖: export AGENTRAG_XXX=yyy

# 文档分块
chunking:
  chunk_size: 512
  chunk_overlap: 64
  separators: ["\n\n", "\n", "。", ".", " ", ""]

# 嵌入模型
embedding:
  model_name: "BAAI/bge-small-zh-v1.5"  # 轻量: bge-small-zh | 标准: bge-base-zh
  device: "cpu"                           # cpu | cuda
  normalize: true
  quantized: false                        # Phase 4 开启 ONNX INT8
  batch_size: 32

# 向量索引 (Phase 1: numpy 全遍历 / Phase 2: IVF-PQ C++)
index:
  dense:
    # IVF 参数 (Phase 2)
    n_clusters: 256
    n_probe: 8
    # PQ 参数 (Phase 2)
    n_subvectors: 64       # 768 / 64 = 12 维/段
    n_bits: 8              # 每段 256 个码字
    # 持久化
    persist_path: "./data/vector_index/"
  sparse:
    k1: 1.5                # BM25 词频饱和度
    b: 0.75                # 长度归一化

# 检索
retrieval:
  top_k: 50                # 粗排候选数
  final_k: 5               # 最终返回数
  rerank:
    enabled: false          # Phase 2 开启
    model_name: "BAAI/bge-reranker-base"
    top_n: 50              # 粗排 top-N 送入重排

# 生成模型 (llama.cpp)
generation:
  model_path: ""            # GGUF 文件路径（必填）
  n_ctx: 4096               # 上下文窗口
  n_threads: 8              # CPU 线程数
  n_gpu_layers: 0           # GPU offload 层数 (0=纯CPU, -1=全GPU)
  temperature: 0.7
  top_p: 0.9
  max_tokens: 1024

# KV Cache (Phase 3)
kv_cache:
  monitor: true             # 监控 KV Cache 使用率
  warn_threshold: 0.9       # 90% 使用率警告
  prefix_cache: false       # Phase 3 开启 Prefix Caching
  prefix_cache_size: 4      # 缓存前缀数

# CLI
cli:
  progress_bar: true
  show_sources_default: false

# API (Phase 5)
api:
  host: "127.0.0.1"
  port: 8000

# 日志
logging:
  level: "INFO"             # DEBUG | INFO | WARNING | ERROR
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
